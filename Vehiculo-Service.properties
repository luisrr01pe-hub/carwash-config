server.port=9003

eureka.client.service-url.defaultZone=http://${EUREKA_HOST:localhost}:8761/eureka

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/carwash_vehiculo_db?createDatabaseIfNotExist=true
spring.datasource.username=root
